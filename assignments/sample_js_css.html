<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Introduction</title>
<style>/* style.css */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f9;
    color: #333;
    text-align: center;
}

.hero {
    background-color: #007bff;
    color: white;
    padding: 100px 20px;
}

.about {
    padding: 50px 20px;
    max-width: 600px;
    margin: auto;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    background-color: #28a745;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>
</head>
<body>
    <header class="hero">
        <h1 id="greeting">Hello, I'm [Your Name]!</h1>
        <p>Welcome to my personal introduction page.</p>
        <button id="changeText">Click for a surprise!</button>
    </header>

    <section class="about">
        <h2>About Me</h2>
        <p>I am an aspiring developer learning how to build simple and effective web pages using HTML, CSS, and JavaScript.</p>
    </section>

    <script >// script.js
document.getElementById('changeText').addEventListener('click', function() {
    const greeting = document.getElementById('greeting');
    greeting.textContent = "Glad to have you here!";
    greeting.style.color = "#ffeb3b";
    alert("Thanks for visiting my page!");
});
</script>
</body>
</html>
