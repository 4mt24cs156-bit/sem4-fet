<!DOCTYPE html>
<html>
<head>
    <title>Dropdown & List Box Example</title>
</head>
<body>
   <link rel="stylesheet" href="style.css">
<h2>Pull-Down Menu (Drop-down)</h2>

<select id="dropdown" onchange="showSelection()">
    <option value="">Select a fruit</option>
    <option value="Apple">Apple</option>
    <option value="Banana">Banana</option>
    <option value="Mango">Mango</option>
</select>

<p id="result1"></p>

<hr>

<h2>List Box (Multiple Selection)</h2>

<select id="listbox" size="4" multiple>
    <option value="HTML">HTML</option>
    <option value="CSS">CSS</option>
    <option value="JavaScript">JavaScript</option>
    <option value="Python">Python</option>
</select>

<br><br>
<button id="btn">Show Selected</button>

<p id="result2"></p>

<script src="script.js">

</script>

</body>
</html>
