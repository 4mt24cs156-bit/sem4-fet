<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Loops</title>

    <!-- External CSS File -->
    <style>body{

    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: Arial, sans-serif;

    background: linear-gradient(
        to right,
        rgb(50,180,190),
        rgb(160,160,160)
    );
}

.container{

    width: 400px;

    background: white;

    padding: 25px;

    border-radius: 10px;

    text-align: center;

    box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

h1{
    color: #333;
}

button{

    padding: 10px 15px;

    margin: 10px;

    border: none;

    border-radius: 5px;

    background: rgb(50,180,190);

    color: white;

    font-size: 16px;

    cursor: pointer;
}

button:hover{

    background: rgb(30,150,160);
}

#output{

    margin-top: 20px;

    padding: 15px;

    border: 2px solid #ccc;

    border-radius: 5px;

    min-height: 120px;

    text-align: left;

    background: #f9f9f9;
}</style>
</head>

<body>

    <div class="container">

        <h1>While Loop & Do While Loop</h1>

        <button onclick="runWhileLoop()">
            Run While Loop
        </button>

        <button onclick="runDoWhileLoop()">
            Run Do While Loop
        </button>

        <div id="output"></div>

    </div>

    <!-- External JavaScript File -->
    <script>// WHILE LOOP FUNCTION

function runWhileLoop(){

    let output = document.getElementById("output");

    output.innerHTML = "<h3>While Loop Output</h3>";

    let i = 1;

    while(i <= 5){

        output.innerHTML += "Number : " + i + "<br>";

        i++;
    }
}


// DO WHILE LOOP FUNCTION

function runDoWhileLoop(){

    let output = document.getElementById("output");

    output.innerHTML = "<h3>Do While Loop Output</h3>";

    let j = 1;

    do{

        output.innerHTML += "Value : " + j + "<br>";

        j++;

    }while(j <= 5);
}</script>

</body>
</html>
